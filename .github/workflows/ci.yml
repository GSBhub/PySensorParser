name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  # ── Unit tests (no radare2 needed) ──────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v -m "not integration"

  # ── Integration test (needs radare2 + r2-m7700) ──────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install radare2 from source
        run: |
          git clone --depth=1 https://github.com/radareorg/radare2.git /tmp/radare2
          /tmp/radare2/sys/install.sh

      - name: Build and install r2-m7700 plugin
        run: |
          git clone --depth=1 https://github.com/GSBHub/r2-m7700.git /tmp/r2-m7700
          make -C /tmp/r2-m7700
          mkdir -p ~/.local/share/radare2/plugins
          cp /tmp/r2-m7700/asm/arch_m7700.so /tmp/r2-m7700/anal/anal_m7700.so ~/.local/share/radare2/plugins/

      - name: Verify M7700 arch loads in radare2
        run: |
          r2 -q -c "La~m7700" /dev/null | grep -q m7700

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/ -v -m integration
