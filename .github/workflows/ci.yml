name: CI

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  # ── Unit tests (no radare2 needed) ──────────────────────────────────────────
  unit-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run unit tests
        run: pytest tests/ -v -m "not integration"

  # ── Integration test (needs radare2 + r2-m7700) ──────────────────────────────
  integration-test:
    runs-on: ubuntu-latest
    needs: unit-tests

    steps:
      - uses: actions/checkout@v4

      - name: Install radare2
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y radare2 libr2-dev make gcc

      - name: Build and install r2-m7700 plugin
        run: |
          git clone --depth=1 https://github.com/GSBHub/r2-m7700.git /tmp/r2-m7700
          make -C /tmp/r2-m7700
          sudo make -C /tmp/r2-m7700 install

      - name: Verify M7700 arch loads in radare2
        run: |
          radare2 -q -c "e asm.arch=m7700; e asm.arch" - <<< "" | grep -q m7700

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run integration tests
        run: pytest tests/ -v -m integration
